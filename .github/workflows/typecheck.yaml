name: Typecheck (sdk)

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "ts/sdk/**"
      - "rust/**"
      - ".github/workflows/typecheck.yaml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: ts/sdk/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn build:types

  rust-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: "Cargo Check (default TLS: native-tls)"
        run: cargo check

      - name: Cargo Check (rustls/aws-lc-rs)
        run: cargo check --no-default-features --features tls-rustls
